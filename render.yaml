services:
  # Backend API Service
  - type: web
    name: jasiq-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: jasiq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: jasiq-frontend
          property: url
    healthCheckPath: /

  # Frontend Static Site
  - type: web
    name: jasiq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: jasiq-backend
          property: url

  # Database
  - type: postgres
    name: jasiq-db
    ipAllowList: []
